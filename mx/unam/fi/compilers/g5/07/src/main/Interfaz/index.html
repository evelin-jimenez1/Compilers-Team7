<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilador Team 7 - IDE Web</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4caf50;
            margin-bottom: 5px;
        }
        h3 {
            text-align: center;
            color: #888;
            margin-top: 0;
            font-weight: 400;
        }
        .ide-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 450px;
            background-color: #121214;
            color: #a9b7c6;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            resize: none;
        }
        textarea:focus {
            outline: 1px solid #4caf50;
        }
        .output-box {
            width: 100%;
            height: 450px;
            background-color: #0c0c0d;
            color: #33ff33;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .btn-container {
            text-align: center;
            margin-top: 15px;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Compilador C-Pure</h1>
        <h3>Interfaz de Usuario - Team 7</h3>

        <div class="ide-grid">
            <div>
                <label style="display:block; margin-bottom: 5px; font-weight: bold;">Código Fuente (C):</label>
                <textarea id="code-input" placeholder="// Escribe tu código en subconjunto de C aquí...&#10;int main() {&#10;    int x = 10;&#10;    int y = 5;&#10;    if (x > y) {&#10;        x = x + 1;&#10;    }&#10;    return x;&#10;}"></textarea>
            </div>
            <div>
                <label style="display:block; margin-bottom: 5px; font-weight: bold;">Consola de Salida / Linker / ASM:</label>
                <div id="output-screen" class="output-box">Presiona 'Compilar y Ejecutar' para iniciar el pipeline de análisis...</div>
            </div>
        </div>

        <div class="btn-container">
            <button id="compile-btn">Compilar y Ejecutar</button>
        </div>
    </div>

    <script type="py" src="./main_web.py" config="./pyscript.toml"></script>
</body>
</html>
